name: HelmWatch
options:
  deploymentTarget:
    watchOS: 11.0
settings:
  base:
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_VERSION: 6.0

targets:
  HelmWatch:
    type: application
    platform: watchOS
    bundleId: com.devlin.helm.watch
    sources:
      - path: Sources
        type: syncedFolder
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.devlin.helm.watch
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        GENERATE_INFOPLIST_FILE: NO
    dependencies: []

schemes:
  HelmWatch:
    shared: true
    build:
      targets:
        HelmWatch: all
    run:
      config: Debug
