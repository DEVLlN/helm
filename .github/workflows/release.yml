name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish_npm:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Enforce public repo scope
        run: scripts/check-public-repo.sh

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p 'require("./package.json").version')"
          test "$tag_version" = "$package_version"

      - name: Validate npm package payload
        run: npm run pack:dry-run

      - name: Check npm publish configuration
        id: npm_config
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${NPM_TOKEN}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping npm publish because NPM_TOKEN is not configured." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish package to npm
        if: steps.npm_config.outputs.configured == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  update_homebrew_tap:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enforce public repo scope
        run: scripts/check-public-repo.sh

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p 'require("./package.json").version')"
          test "$tag_version" = "$package_version"

      - name: Check tap update configuration
        id: tap_config
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Homebrew tap update because HOMEBREW_TAP_TOKEN is not configured." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create GitHub release if needed
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --generate-notes

      - name: Render and push updated formula
        if: steps.tap_config.outputs.configured == 'true'
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          tarball_url="https://codeload.github.com/${GITHUB_REPOSITORY}/tar.gz/refs/tags/${GITHUB_REF_NAME}"
          sha256="$(curl -fsSL "$tarball_url" | shasum -a 256 | awk '{print $1}')"

          temp_dir="$(mktemp -d)"
          trap 'rm -rf "$temp_dir"' EXIT

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/DEVLlN/homebrew-helm.git" "$temp_dir/homebrew-helm"
          mkdir -p "$temp_dir/homebrew-helm/Formula"
          node scripts/render-homebrew-formula.mjs \
            --version "$version" \
            --sha256 "$sha256" \
            > "$temp_dir/homebrew-helm/Formula/helm.rb"

          cd "$temp_dir/homebrew-helm"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/helm.rb

          if git diff --cached --quiet; then
            echo "Homebrew tap already up to date."
            exit 0
          fi

          git commit -m "helm ${version}"
          git push origin HEAD
