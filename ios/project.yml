name: Helm
options:
  deploymentTarget:
    iOS: 18.0
settings:
  base:
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_VERSION: 6.0

targets:
  Helm:
    type: application
    platform: iOS
    bundleId: com.devlin.helm
    sources:
      - path: Sources
        type: syncedFolder
    resources:
      - Resources
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.devlin.helm
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        DEVELOPMENT_ASSET_PATHS: "\"Resources/Preview Content\""
    dependencies: []

  HelmTests:
    type: bundle.unit-test
    platform: iOS
    bundleId: com.devlin.helm.Tests
    sources:
      - path: Tests
        type: syncedFolder
    settings:
      base:
        INFOPLIST_FILE: Tests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.devlin.helm.Tests
    dependencies:
      - target: Helm

schemes:
  Helm:
    shared: true
    build:
      targets:
        Helm: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HelmTests
